<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      .gold { fill: #c9a84c; }
      .gold-s { fill: none; stroke: #c9a84c; }
    </style>
  </defs>

  <!-- Outer decorative diamond frame -->
  <polygon class="gold-s" stroke-width="1.5"
    points="50,6 94,50 50,94 6,50"/>
  <!-- Inner diamond -->
  <polygon class="gold-s" stroke-width="0.8" opacity="0.5"
    points="50,13 87,50 50,87 13,50"/>

  <!-- Corner ornaments -->
  <circle class="gold" cx="50" cy="6.5" r="2"/>
  <circle class="gold" cx="93.5" cy="50" r="2"/>
  <circle class="gold" cx="50" cy="93.5" r="2"/>
  <circle class="gold" cx="6.5" cy="50" r="2"/>

  <!-- K letterform -->
  <rect class="gold" x="31" y="25" width="7" height="50" rx="1"/>
  <rect class="gold" x="27" y="25" width="15" height="3" rx="1"/>
  <rect class="gold" x="27" y="72" width="15" height="3" rx="1"/>
  <polygon class="gold" points="38,52  38,46  66,26  66,33"/>
  <rect class="gold" x="62" y="25" width="8" height="3" rx="1" transform="rotate(-30 66 27)"/>
  <polygon class="gold" points="38,55  38,61  66,74  66,67"/>
  <rect class="gold" x="62" y="72" width="8" height="3" rx="1" transform="rotate(30 66 73)"/>

  <!-- Small fleur-de-lis style ornament -->
  <ellipse class="gold" cx="50" cy="84" rx="3" ry="1.5" opacity="0.7"/>
  <line stroke="#c9a84c" stroke-width="1" x1="50" y1="80" x2="50" y2="83"/>
  <line stroke="#c9a84c" stroke-width="0.8" x1="47" y1="81.5" x2="53" y2="81.5"/>
</svg>
